<nav class="navbar">
    <div class="logo"><img src="assets/saifullah.png" alt="Segun"></div>
    <button *ngIf="isMobile" class="menu-btn" (click)="toggleMenu()">
      <i class="fa fa-bars"></i>
    </button>
    <ul class="nav-links" [class.open]="menuOpen || !isMobile">
      <li><a (click)="toggleMenu()" routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact:true}">Home</a></li>
      <li><a (click)="toggleMenu()" routerLink="/about-me" routerLinkActive="active-link">About Me</a></li>
      <li><a (click)="toggleMenu()" routerLink="/mini-games" routerLinkActive="active-link">Fun Time</a></li>
    </ul>
    <button class="theme-toggle" (click)="toggleTheme()">
      <i *ngIf="themeService.isDarkMode(); else lightMode" class="fa-sharp fa-solid fa-sun"></i>
      <ng-template #lightMode>
        <i class="fa-sharp fa-solid fa-moon"></i>
      </ng-template>
    </button>
  </nav>
